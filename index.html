                mike:  { id: 'mike',  name: 'MIKE CONY',  emoji: '🧸', squadImage: 'picset3/88.webp', cardDesc: 'คุณน่าจะเป็นคนที่แบกอะไรไว้เยอะกว่าที่พูด<br>และใช้ความอบอุ่นดูแลทุกคน จนลืมดูแลตัวเอง', charImage: 'picset%20%E0%B8%9C%E0%B8%A5%E0%B8%A5%E0%B8%B1%E0%B8%9E%E0%B8%98%E0%B9%8C/mike.webp', desc: 'คุณได้ Mike Cony<br>เพราะคำตอบของคุณสะท้อนคนที่ชอบ “รับผิดชอบทุกอย่าง” มากเกินไป<br><br>คุณน่าจะเป็นคนที่ต่อให้เหนื่อย ก็ยังคิดถึงคนอื่นก่อนตัวเอง<br><br>คุณไม่ค่อยพูดเรื่องความลำบากออกมาตรง ๆ<br>และมักเลือกจัดการปัญหาเงียบ ๆ คนเดียว<br><br>หลายครั้งคุณตอบเหมือนคนที่พยายามอดทนไว้ตลอด<br>จนลืมไปว่าตัวเองก็มีสิทธิ์อ่อนแอ<br><br>Mike คือกระต่ายของคนที่อบอุ่น มั่นคง และพึ่งพาได้<br>แต่ข้างในก็มีวันที่อยากพักจากทุกอย่างเหมือนกัน', tag: 'Warm Hearted', motto: 'คุณน่าจะเป็นคนที่แบกอะไรไว้เยอะกว่าที่พูด<br>และใช้ความอบอุ่นดูแลทุกคน จนลืมดูแลตัวเอง', encouragements: ['คุณแบกอะไรไว้เยอะกว่าที่พูดออกมาอีกใช่ไหม', 'พักบ้างนะ คนที่คอยดูแลทุกคนก็เหนื่อยเป็นเหมือนกัน', 'ไม่เป็นไรเลย ถ้าวันนี้คุณจะเลือกดูแลตัวเองก่อนใคร'], theme: 'bg-emerald-100 text-emerald-800', borderTheme: 'border-emerald-200' },

                        </div>
                        <div class="bg-[#5c3d28] rounded-[2rem] shadow-xl p-6 md:p-8 max-w-2xl w-full border border-[#432c1c]/10">
                            <h2 class="text-2xl font-bold mb-8 text-center text-[#b1c7db] leading-tight">${question.question.replace(/\n/g,'<br>')}</h2>
                            <div class="flex flex-col gap-4">
                                ${question.choices.map((choice, i) => `
                                    <button onclick='handleAnswer(${JSON.stringify(choice.scores)})' class="text-left w-full p-5 rounded-2xl border border-[#b1c7db]/30 bg-[#b1c7db]/15 hover:bg-[#b1c7db]/30 hover:border-[#b1c7db]/70 transition-all text-[#b1c7db] tracking-wide">
                                        ${choice.text.replace(/"/g, '&quot;')}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        ${state.currentQuestion > 0 ? `<button onclick="goBack()" class="mt-4 text-[#432c1c]/50 hover:text-[#432c1c]/80 text-sm transition-colors">&larr; ย้อนกลับข้อก่อนหน้า</button>` : ''}
                    </div>
                `;
            } else if (state.screen === 'loading') {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4 fade-in">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 bg-[#432c1c] rounded-full animate-bounce" style="animation-delay: 0s"></div>
                            <div class="w-3 h-3 bg-[#432c1c] rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
                            <div class="w-3 h-3 bg-[#432c1c] rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'result' && state.result) {
                const res = state.result;
                app.innerHTML = `
                    <div class="min-h-screen bg-[#3a2518] flex items-center justify-center p-4 py-12 fade-in">
                        <div id="resultCard" class="bg-[#b1c7db] rounded-[3rem] shadow-2xl p-6 md:p-10 max-w-lg w-full relative overflow-hidden border border-white">
                            <div class="relative z-10">
                                <div class="text-center mb-6">
                                    <p class="text-[#432c1c]/60 text-lg font-medium tracking-wide mb-1">เพื่อนที่รู้ใจของคุณคือ...</p>
                                    <h1 class="text-3xl md:text-4xl font-extrabold text-[#432c1c] tracking-tight">${res.name}</h1>
                                </div>
                                <div class="w-72 h-72 mx-auto rounded-2xl overflow-hidden mb-8">
                                    <img src="${res.charImage}${IMG_V}" alt="${res.name}" class="w-full h-full object-cover">
                                </div>
                                <div class="bg-[#FBF8F2] p-6 rounded-3xl mb-8 text-left border border-[#432c1c]/20 relative mt-10">
                                    <div class="absolute -top-4 left-6 bg-[#432c1c] text-white text-xs font-bold uppercase px-4 py-1.5 rounded-full shadow-md tracking-wider">💌 ข้อความถึงคุณ</div>
                                    <p class="text-[#432c1c] text-sm leading-relaxed font-medium mt-2">${res.encouragements[Math.floor(Math.random() * res.encouragements.length)]}</p>
                                </div>
                                <p class="text-[#432c1c]/80 mb-8 text-lg leading-relaxed">${res.desc}</p>
                                <div class="p-6 rounded-3xl mb-8 text-sm bg-[#FBF8F2] border border-[#432c1c]/20 text-[#432c1c] leading-relaxed">${res.motto}</div>
                                <div class="space-y-3">
                                    <button onclick="saveResultCard()" class="w-full bg-[#fdf6ec] text-[#432c1c] hover:bg-[#f0e8d8] font-medium py-4 px-6 rounded-2xl transition-all shadow-xl shadow-[#432c1c]/10 text-lg text-center">บันทึกผลลัพธ์ 🤍</button>
                                    <button onclick="startQuiz()" class="w-full bg-[#432c1c] text-white hover:bg-[#9db3c7] font-bold py-4 px-6 rounded-2xl transition-all shadow-xl shadow-[#432c1c]/20 text-lg">เล่นอีกครั้ง</button>
                                    <a href="https://shop.line.me/@conyandco/product/1007948651" target="_blank" rel="noopener noreferrer" class="block w-full bg-[#fdf6ec] text-[#432c1c] hover:bg-[#f0e8d8] font-medium py-4 px-6 rounded-2xl transition-all shadow-xl shadow-[#432c1c]/10 text-lg text-center">พาน้องกลับบ้าน 🤍 / Take me home! 🐰</a>
                                    <button onclick="setScreen('welcome')" class="w-full mt-1 text-[#432c1c]/60 hover:text-[#432c1c] text-sm transition-colors">กลับไปหน้าแรก</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function saveResultCard() {
            const res = state.result;
            if (!res) return;
            const btn = document.querySelector('[onclick="saveResultCard()"]');
            const origText = btn ? btn.textContent : '';
            if (btn) btn.textContent = 'กำลังบันทึก...';

            const enc = res.encouragements[Math.floor(Math.random() * res.encouragements.length)];

            const exportEl = document.getElementById('storyExportCard');
            exportEl.innerHTML = `
                <div style="width:540px;background:#b1c7db;padding:44px 36px 44px;box-sizing:border-box;font-family:'Prompt',sans-serif;display:flex;flex-direction:column;align-items:center;gap:0;">
                    <p style="color:#432c1c;opacity:0.6;font-size:14px;font-weight:500;letter-spacing:2px;margin:0 0 6px;text-align:center;">เพื่อนที่รู้ใจของคุณคือ...</p>
                    <h1 style="color:#432c1c;font-size:30px;font-weight:800;margin:0 0 24px;text-align:center;line-height:1.2;">${res.name}</h1>
                    <div style="width:240px;height:240px;border-radius:20px;overflow:hidden;margin-bottom:28px;flex-shrink:0;">
                        <img src="${res.charImage}${IMG_V}" style="width:100%;height:100%;object-fit:cover;" crossorigin="anonymous">
                    </div>
                    <div style="background:#FBF8F2;border-radius:20px;padding:20px 22px;width:100%;box-sizing:border-box;margin-bottom:18px;border:1px solid rgba(67,44,28,0.15);">
                        <p style="color:#432c1c;font-size:11px;font-weight:700;letter-spacing:1.5px;margin:0 0 10px;text-transform:uppercase;">💌 ข้อความถึงคุณ</p>
                        <p style="color:#432c1c;font-size:13px;line-height:1.8;margin:0;">${enc}</p>
                    </div>
                    <p style="color:rgba(67,44,28,0.85);font-size:15px;line-height:1.75;margin:0 0 18px;width:100%;text-align:left;">${res.desc}</p>
                    <div style="background:#FBF8F2;border-radius:20px;padding:18px 22px;width:100%;box-sizing:border-box;border:1px solid rgba(67,44,28,0.15);color:#432c1c;font-size:13px;line-height:1.8;margin-bottom:20px;">${res.motto}</div>
                    <p style="color:#432c1c;opacity:0.35;font-size:10px;margin:0;letter-spacing:1.5px;">Cony &amp; Co. — conywithfriends</p>
                </div>
            `;

            const img = exportEl.querySelector('img');
            const doCapture = () => {
                const el = exportEl.firstElementChild;
                html2canvas(el, { scale: 2, useCORS: true, allowTaint: false, backgroundColor: '#b1c7db', width: 540, height: el.offsetHeight }).then(canvas => {
                    exportEl.innerHTML = '';
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = 'my-cony-result.png';
                    a.click();
                    if (btn) btn.textContent = origText;
                }).catch(() => {
                    exportEl.innerHTML = '';
                    if (btn) btn.textContent = origText;
                });
            };
            if (img) { img.onload = doCapture; img.onerror = doCapture; if (img.complete) doCapture(); }
            else doCapture();
        }

        function saveCharImage(src, name) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                canvas.getContext('2d').drawImage(img, 0, 0);
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/webp', 0.9);
                a.download = name.replace(/\s+/g, '_') + '.webp';
                a.click();
            };
            img.onerror = function() {
                // fallback: open in new tab for manual save
                window.open(src, '_blank');
            };
            img.src = src;
        }

        function openStory(charId) {
            const char = CHARACTERS[charId];
            const story = STORIES[charId];
            if (!story) return;
            document.getElementById('storyContent').innerHTML = `
                <div class="w-24 h-24 mx-auto rounded-full overflow-hidden mb-5 border-4 border-[#432c1c]/20">
                    <img src="${char.squadImage}" class="w-full h-full object-cover" alt="${char.name}">
                </div>
                ${story}
            `;
            document.getElementById('storyModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeStory() {
            document.getElementById('storyModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // เริ่มต้นแอป
        render();

        function tiltCard(e, el) {
            const rect = el.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            const rotateX = ((y - cy) / cy) * -8;
            const rotateY = ((x - cx) / cx) * 8;
            el.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.04)`;
        }

        function resetCard(el) {
            el.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(1)';
        }

        function clickCard(el) {
            el.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(0.97)';
        }
    </script>

    <div id="storyModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" onclick="closeStory()" style="background:rgba(58,37,24,0.7)">
        <div class="bg-[#FBF8F2] rounded-[2rem] max-w-lg w-full max-h-[85vh] overflow-y-auto p-8 relative shadow-2xl fade-in" onclick="event.stopPropagation()">
            <button onclick="closeStory()" class="absolute top-4 right-4 w-9 h-9 rounded-full bg-[#432c1c] text-white flex items-center justify-center text-xl font-bold hover:bg-[#5c3d28] leading-none">&times;</button>
            <div id="storyContent" class="pr-1"></div>
            <div class="text-center mt-6">
                <button onclick="closeStory()" class="text-[#432c1c]/50 hover:text-[#432c1c]/80 text-sm transition-colors">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <!-- Hidden Story Card for saving -->
    <div id="storyExportCard" style="position:fixed;left:-9999px;top:0;width:540px;overflow:hidden;font-family:'Prompt',sans-serif;"></div>
</body>
</html>
