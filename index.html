            for (const char in choiceScores) {

            if (state.currentQuestion < QUESTIONS.length - 1) {

                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });

            }

            setScreen('loading');
            let maxChar = 'mimi';
            let maxScore = -1;
            
            for (const char in state.scores) {

                    maxScore = state.scores[char];
                    maxChar = char;
                }
            }

            setTimeout(() => {
                state.result = CHARACTERS[maxChar];
                setScreen('result');
            }, 2000);
